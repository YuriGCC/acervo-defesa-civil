<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/icone-uniasselvi.png" type="image/x-icon">
    <title>Acervo de Jogos</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #container-menu,
        #container-jogo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #container-jogo {
            display: none;
            background-color: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        * {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="container-menu"></div>

    <div id="container-jogo"></div>

    <script src="config-jogos.js"></script>
    <script src="evento-ponte.js"></script>

    <script src="phaser.min.js"></script>

    <script src="menu.js"></script>
    <script src="main.js"></script>
</body>

</html>
