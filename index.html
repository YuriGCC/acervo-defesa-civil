    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <title>Acervo de Jogos</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #container-menu,
        #container-jogo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #container-jogo {
            display: none;
            background-color: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        * {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="container-menu"></div>

    <div id="container-jogo"></div>

    <script src="config-jogos.js"></script>
    <script src="evento-ponte.js"></script>

    <script src="phaser.min.js"></script>

    <script src="menu.js"></script>
    <script src="main.js"></script>
</body>

</html>

<link rel="manifest" href="manifest.json">

<script>
    // Checagem se navegador suporta workers para instalar o worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('PWA Ativo', reg))
                .catch(err => console.log('Erro ao registrar PWA', err));
        });
    }
</script>
