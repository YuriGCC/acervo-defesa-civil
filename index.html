<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <!--
        ACESSIBILIDADE: Removido 'maximum-scale=1.0, user-scalable=no'.
        WCAG 1.4.4 (Resize Text) exige que o usuário possa ampliar até 200%
        sem perda de conteúdo. Bloquear o zoom viola este critério.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icone-uniasselvi.png" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="57x57" href="assets/favicons/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="assets/favicons/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/favicons/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="assets/favicons/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="assets/favicons/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/favicons/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/favicons/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/favicons/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <!--
        ACESSIBILIDADE: Título descritivo melhora a experiência em leitores de tela
        e é exigido pelo WCAG 2.4.2 (Page Titled).
    -->
    <title>Acervo de Jogos Educativos</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #container-menu,
        #container-jogo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #container-jogo {
            display: none;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /*
            RESPONSIVIDADE: Removido 'touch-action: none' global.
            Aplicar isso globalmente bloqueia scroll e gestos nativos do SO,
            prejudicando usuários de dispositivos móveis e tecnologias assistivas.
            O Phaser gerencia o touch-action no canvas diretamente.
        */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        /*
            ACESSIBILIDADE (WCAG 2.4.7 - Focus Visible):
            Indicador de foco visível para navegação por teclado.
            O outline padrão do browser é frequentemente removido por CSS resets,
            tornando impossível saber qual elemento está focado.
        */
        *:focus-visible {
            outline: 3px solid #FFD700;
            outline-offset: 3px;
        }

        /*
            ACESSIBILIDADE: Região de anúncio para leitores de tela (ARIA live region).
            Visualmente oculta mas acessível a tecnologias assistivas.
            Anuncia mudanças de estado do jogo (ex: "Jogo Quiz iniciado").
        */
        #aria-announcer {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /*
            ACESSIBILIDADE: Botão de retorno ao menu acessível via teclado e
            visível sobre o iframe do jogo.
        */
        #btn-voltar-menu {
            display: none;
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 9999;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        #btn-voltar-menu:hover,
        #btn-voltar-menu:focus-visible {
            background: rgba(255, 255, 255, 0.2);
            outline: 3px solid #FFD700;
        }
    </style>
</head>

<body>
    <!--
        ACESSIBILIDADE (WCAG 4.1.2 - Name, Role, Value):
        role="application" informa leitores de tela que esta região é uma
        aplicação interativa, não um documento estático.
        aria-label fornece nome acessível para a aplicação.
    -->
    <div
        id="container-menu"
        role="application"
        aria-label="Acervo de Jogos Educativos - Menu de seleção de jogos"
    ></div>

    <!--
        ACESSIBILIDADE: aria-live removido daqui — conflitava com o #aria-announcer,
        causando anúncios duplicados em leitores de tela.
        role="region" + aria-label mantém a semântica sem o live region duplicado.
    -->
    <div
        id="container-jogo"
        role="region"
        aria-label="Área do jogo em execução"
    ></div>

    <!--
        ACESSIBILIDADE: Botão HTML nativo para voltar ao menu.
        Elementos <button> nativos são automaticamente acessíveis por teclado
        e leitores de tela, sem necessidade de ARIA adicional.
    -->
    <button id="btn-voltar-menu" aria-label="Voltar ao menu de jogos">
        ← Voltar ao Menu
    </button>

    <!--
        ACESSIBILIDADE (ARIA Live Region):
        Elemento invisível que anuncia mudanças de estado para leitores de tela.
        Usado para informar qual jogo foi iniciado ou quando o menu voltou.
    -->
    <div id="aria-announcer" aria-live="assertive" aria-atomic="true"></div>

    <script src="config-jogos.js"></script>
    <script src="evento-ponte.js"></script>
    <script src="phaser.min.js"></script>
    <script src="menu.js"></script>
    <script src="main.js"></script>

    <script>
        /*
            ACESSIBILIDADE (WCAG 4.1.2 - Name, Role, Value):
            O Phaser injeta um <canvas> no DOM sem atributos de acessibilidade.
            Leitores de tela ignoram ou anunciam "canvas" sem contexto.
            Aguardamos o Phaser criar o canvas e então adicionamos os atributos.
            role="img" + aria-label descrevem o propósito do canvas.
            aria-hidden="false" garante que não seja ignorado por engano.
        */
        window.addEventListener('load', () => {
            // Phaser pode levar alguns frames para injetar o canvas
            const tentarRotularCanvas = (tentativas = 0) => {
                const canvas = document.querySelector('#container-menu canvas');
                if (canvas) {
                    canvas.setAttribute('role', 'img');
                    canvas.setAttribute('aria-label', 'Menu interativo de seleção de jogos educativos. Use as setas do teclado para navegar.');
                    canvas.setAttribute('tabindex', '0');
                } else if (tentativas < 20) {
                    setTimeout(() => tentarRotularCanvas(tentativas + 1), 100);
                }
            };
            tentarRotularCanvas();
        });

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA Ativo', reg))
                    .catch(err => console.log('Erro ao registrar PWA', err));
            });
        }
    </script>
</body>

</html>
