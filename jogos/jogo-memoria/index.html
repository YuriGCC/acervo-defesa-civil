<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória</title>
    <script src="phaser.min.js"></script>
    <style> 
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none; 
        } 
    </style>
</head>
<body>
    <script type="module">
        import JogoMemoria from './JogoMemoria.js';
        const config = {
            type: Phaser.AUTO,
            width: 1920,
            height: 1080,
            scale: { 
                mode: Phaser.Scale.FIT, 
                autoCenter: Phaser.Scale.CENTER_BOTH 
            },
            input: {
                activePointers: 3 
            },
            scene: [JogoMemoria]
        };
        new Phaser.Game(config);
    </script>
</body>
</html>
