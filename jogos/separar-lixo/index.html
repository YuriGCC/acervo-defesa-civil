<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta Seletiva - Separe o Lixo</title>
    
    <script src="../../phaser.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            touch-action: none;
        }
    </style>
</head>
<body>
    <script type="module">
        import SepararLixo from './SepararLixo.js';
    
        const config = {
            type: Phaser.AUTO,
            width: 1920, 
            height: 1080,
            backgroundColor: '#1a1a1a',
            input: {
                activePointers: 4, 
                touch: { capture: true }
            },
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                parent: document.body,
                expandParent: false
            },
            scene: [SepararLixo]
        };
    
        const game = new Phaser.Game(config);
        window._phaserGame = game;

        game.events.once('ready', () => {
            const origResize = game.scale.resize.bind(game.scale);
            game.scale.resize = (w, h) => {
                if (w > 0 && h > 0) origResize(w, h);
            };
        });
        const rotularCanvas = (n = 0) => {
            const c = document.querySelector('canvas');
            if (c) {
                c.setAttribute('role', 'img');
                c.setAttribute('aria-label', 'Coleta Seletiva: arraste os itens de lixo para a lixeira correta.');
                c.setAttribute('tabindex', '0');
            } else if (n < 20) setTimeout(() => rotularCanvas(n + 1), 100);
        };
        rotularCanvas();
    </script>
</body>
</html>
