<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defesa Civil - Jogo de Associação</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <button class="btn-back" id="btnBack">← SAIR</button>
            <h1>🛡️ Defesa Civil - Jogo de Associação</h1>
            <div class="score-board">
                <span>PONTOS: <strong id="score">0</strong></span>
                <span>NÍVEL: <strong id="level">1</strong></span>
            </div>
        </header>

        <div class="intro-screen" id="introScreen">
            <div class="intro-content">
                <img src="assets/logo_defesa_civil.png" alt="Logo Defesa Civil" class="logo-image">
                <h2>Olá, Pequeno Protetor!</h2>
                <p>Ajude a Defesa Civil a proteger nossa cidade!</p>
                <p style="font-size: 1.8em; margin: 20px 0;">Toque e arraste as situações até as atitudes corretas!</p>
                <button class="btn-start" id="btnStart">COMEÇAR MISSÃO</button>
            </div>
        </div>

        <div class="game-screen hidden" id="gameScreen">
            <div class="instruction">
                <p id="instruction">Conecte os riscos às ações preventivas!</p>
            </div>
            <div class="game-board">
                <canvas id="connectionsCanvas" class="connections-canvas"></canvas>
                <div class="risks-column">
                    <h3>⚠️ SITUAÇÃO</h3>
                    <div id="risksContainer" class="cards-container"></div>
                </div>
                <div class="actions-column">
                    <h3>✅ PREVENÇÃO</h3>
                    <div id="actionsContainer" class="cards-container"></div>
                </div>
            </div>
            <div class="feedback hidden" id="feedback"></div>
        </div>

        <div class="completion-screen hidden" id="completionScreen">
            <div class="completion-content">
                <h2>🎉 MISSÃO CUMPRIDA!</h2>
                <p class="final-score" style="font-size: 2.5em;">Você somou <strong id="finalScore">0</strong> pontos!</p>
                <p id="completionMessage" style="font-size: 1.5em; margin: 30px;"></p>
                <button class="btn-restart" id="btnRestart">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
